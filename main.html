<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>समाज - Social Network</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1877f2;
            --primary-dark: #0a5ccc;
            --secondary: #e1306c;
            --dark: #000000;
            --dark-alt: #121212;
            --light: #ffffff;
            --gray: #737373;
            --gray-light: #f3f3f3;
            --gray-lighter: #fafafa;
            --border: #e5e5e5;
            --success: #31a24c;
            --error: #e0245e;
        }

        html, body {
            height: 100%;
            width: 100%;
            background: var(--dark);
            color: var(--light);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        #app {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* ============ TOAST NOTIFICATIONS ============ */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: var(--dark-alt);
            color: var(--light);
            padding: 14px 18px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 4px solid var(--primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease-out;
            pointer-events: auto;
            font-size: 0.9rem;
            max-width: 350px;
        }

        .toast.success {
            border-left-color: var(--success);
        }

        .toast.error {
            border-left-color: var(--error);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(400px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideOut {
            from {
                opacity: 1;
                transform: translateX(0);
            }
            to {
                opacity: 0;
                transform: translateX(400px);
            }
        }

        /* ============ MAIN LAYOUT ============ */
        .container {
            display: flex;
            height: 100vh;
            position: relative;
        }

        /* ============ SIDEBAR ============ */
        .sidebar {
            width: 280px;
            background: var(--light);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            z-index: 500;
            box-shadow: 2px 0 8px rgba(0,0,0,0.08);
        }

        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: #d0d0d0;
            border-radius: 3px;
        }

        .logo-section {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, #405de6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            letter-spacing: 2px;
        }

        .nav-items {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 12px 0;
            gap: 4px;
        }

        .nav-item {
            padding: 14px 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--dark);
            font-weight: 600;
            font-size: 0.95rem;
            border-left: 3px solid transparent;
            margin: 0 4px;
            border-radius: 0 8px 8px 0;
            user-select: none;
        }

        .nav-item:hover {
            background: var(--gray-lighter);
            border-left-color: var(--primary);
        }

        .nav-item.active {
            background: linear-gradient(90deg, rgba(24, 119, 242, 0.1) 0%, transparent 100%);
            color: var(--primary);
            border-left-color: var(--primary);
            font-weight: 700;
        }

        .nav-item i {
            font-size: 1.3rem;
            min-width: 24px;
        }

        .user-section {
            padding: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            background: var(--gray-lighter);
            border-radius: 8px;
            margin: 0 12px 12px 12px;
            transition: all 0.2s;
        }

        .user-section:hover {
            background: #f0f0f0;
        }

        .user-avatar-small {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--light);
            font-weight: 700;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-username {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--dark);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .user-status {
            font-size: 0.75rem;
            color: var(--gray);
        }

        /* ============ MAIN CONTENT ============ */
        .main-content {
            margin-left: 280px;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--dark);
        }

        .header {
            background: var(--dark-alt);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 100;
        }

        .header-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--light);
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: none;
            color: var(--light);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .icon-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.05);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .content::-webkit-scrollbar {
            width: 6px;
        }

        .content::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }

        /* ============ PAGES ============ */
        .page {
            display: none;
            min-height: 100%;
        }

        .page.active {
            display: flex;
            flex-direction: column;
        }

        /* ============ HOME PAGE ============ */
        .feed {
            padding: 16px 0;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }

        /* ============ STORY SECTION ============ */
        .stories-container {
            background: rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding: 12px 0;
            display: flex;
            gap: 12px;
            padding-left: 16px;
            padding-right: 16px;
            margin-bottom: 12px;
        }

        .stories-container::-webkit-scrollbar {
            height: 4px;
        }

        .stories-container::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
        }

        .story {
            flex-shrink: 0;
            width: 70px;
            cursor: pointer;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 9/16;
            background: linear-gradient(135deg, rgba(24, 119, 242, 0.3) 0%, rgba(224, 36, 94, 0.3) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--light);
            font-size: 2rem;
            border: 2px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
        }

        .story:hover {
            border-color: var(--primary);
            transform: scale(1.02);
        }

        /* ============ CREATE POST ============ */
        .create-post-card {
            background: var(--dark-alt);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 16px;
            margin: 0 16px 12px 16px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .create-post-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--light);
            font-weight: 700;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .create-post-input-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .create-post-input {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 12px 16px;
            color: var(--light);
            font-size: 0.95rem;
            width: 100%;
            transition: all 0.2s;
            cursor: pointer;
        }

        .create-post-input:hover {
            background: rgba(255,255,255,0.12);
        }

        .create-post-input:focus {
            outline: none;
            background: rgba(255,255,255,0.12);
            border-color: var(--primary);
        }

        .create-post-input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .create-post-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .create-action-btn {
            background: rgba(24, 119, 242, 0.2);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .create-action-btn:hover {
            background: rgba(24, 119, 242, 0.3);
        }

        /* ============ POSTS ============ */
        .post {
            background: var(--dark-alt);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            margin: 0 16px 12px 16px;
            overflow: hidden;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .post-header {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .post-user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
            cursor: pointer;
        }

        .post-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--light);
            font-weight: 700;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .post-user-details {
            min-width: 0;
        }

        .post-username {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--light);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .post-username:hover {
            color: var(--primary);
        }

        .post-time {
            font-size: 0.75rem;
            color: var(--gray);
        }

        .post-menu-btn {
            background: none;
            border: none;
            color: var(--gray);
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            padding: 4px 8px;
        }

        .post-menu-btn:hover {
            color: var(--light);
        }

        .post-content {
            padding: 0 16px 12px 16px;
            line-height: 1.5;
            color: rgba(255,255,255,0.9);
            word-break: break-word;
            white-space: pre-wrap;
        }

        .post-image {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            margin: 12px 0 0 0;
        }

        .post-stats {
            padding: 8px 16px;
            border-top: 1px solid rgba(255,255,255,0.08);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--gray);
        }

        .stat {
            cursor: pointer;
            transition: color 0.2s;
        }

        .stat:hover {
            color: var(--primary);
        }

        .post-actions {
            padding: 12px 16px;
            display: flex;
            gap: 4px;
        }

        .action-btn {
            flex: 1;
            padding: 8px 12px;
            background: none;
            border: none;
            color: var(--gray);
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-weight: 600;
        }

        .action-btn:hover {
            background: rgba(255,255,255,0.08);
            color: var(--light);
        }

        .action-btn.liked {
            color: var(--secondary);
        }

        .action-btn i {
            font-size: 1.1rem;
        }

        /* ============ COMMENTS ============ */
        .comments-section {
            padding: 12px 16px;
            border-top: 1px solid rgba(255,255,255,0.08);
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }

        .comments-section.show {
            display: block;
        }

        .comment {
            margin-bottom: 12px;
            display: flex;
            gap: 8px;
        }

        .comment-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--light);
            font-weight: 700;
            font-size: 0.65rem;
            flex-shrink: 0;
        }

        .comment-content {
            flex: 1;
            background: rgba(255,255,255,0.08);
            padding: 8px 12px;
            border-radius: 8px;
        }

        .comment-header {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }

        .comment-username {
            font-weight: 600;
            color: var(--light);
        }

        .comment-username:hover {
            color: var(--primary);
        }

        .comment-time {
            color: var(--gray);
            font-size: 0.75rem;
        }

        .comment-text {
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
            word-break: break-word;
        }

        .comment-input-wrapper {
            padding: 12px 16px;
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            gap: 8px;
            display: none;
        }

        .comment-input-wrapper.show {
            display: flex;
        }

        .comment-input {
            flex: 1;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 12px;
            border-radius: 20px;
            color: var(--light);
            font-size: 0.9rem;
        }

        .comment-input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .comment-input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255,255,255,0.12);
        }

        .comment-submit-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 8px;
            transition: all 0.2s;
        }

        .comment-submit-btn:hover {
            color: var(--secondary);
        }

        .comment-submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ============ EMPTY STATE ============ */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
            color: var(--gray);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.6;
        }

        .empty-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--light);
            margin-bottom: 8px;
        }

        .empty-text {
            font-size: 0.9rem;
            color: var(--gray);
        }

        /* ============ MODALS ============ */
        .modal-backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: flex-end;
            justify-content: center;
            animation: fadeIn 0.2s ease-out;
        }

        .modal-backdrop.show {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal {
            background: var(--dark-alt);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px 20px 0 0;
            padding: 24px 16px;
            max-height: 90vh;
            overflow-y: auto;
            width: 100%;
            max-width: 500px;
            animation: slideUp 0.3s ease-out;
        }

        .modal-header {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--light);
            text-align: center;
        }

        .modal-close-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            color: var(--gray);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 4px;
            transition: all 0.2s;
        }

        .modal-close-btn:hover {
            color: var(--light);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--light);
        }

        .form-input, .form-textarea {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: var(--light);
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.2s;
        }

        .form-input:focus, .form-textarea:focus {
            outline: none;
            background: rgba(255,255,255,0.12);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(24, 119, 242, 0.1);
        }

        .form-textarea {
            resize: vertical;
            min-height: 120px;
        }

        .form-input::placeholder, .form-textarea::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, #405de6 100%);
            color: var(--light);
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(24, 119, 242, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: var(--light);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
        }

        .btn-danger {
            background: rgba(224, 36, 94, 0.2);
            color: var(--secondary);
            border: 1px solid var(--secondary);
        }

        .btn-danger:hover {
            background: rgba(224, 36, 94, 0.3);
        }

        /* ============ PROFILE PAGE ============ */
        .profile-header {
            background: linear-gradient(135deg, rgba(24, 119, 242, 0.3) 0%, rgba(224, 36, 94, 0.3) 100%);
            padding: 40px 16px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .profile-avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--light);
            font-weight: 700;
            font-size: 2rem;
            margin: 0 auto 16px;
            border: 3px solid rgba(255,255,255,0.1);
        }

        .profile-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--light);
            margin-bottom: 4px;
        }

        .profile-username {
            font-size: 0.9rem;
            color: var(--gray);
            margin-bottom: 12px;
        }

        .profile-stats {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-top: 20px;
        }

        .profile-stat {
            text-align: center;
        }

        .profile-stat-number {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--light);
        }

        .profile-stat-label {
            font-size: 0.75rem;
            color: var(--gray);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .profile-actions {
            display: flex;
            gap: 12px;
            padding: 16px;
        }

        .profile-actions button {
            flex: 1;
        }

        .profile-bio {
            padding: 16px;
            color: rgba(255,255,255,0.8);
            line-height: 1.5;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .profile-posts {
            padding: 16px 0;
        }

        /* ============ EXPLORE PAGE ============ */
        .explore-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2px;
            padding: 16px 0;
            max-width: 500px;
            margin: 0 auto;
        }

        .explore-card {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--light);
            font-size: 2rem;
            transition: all 0.2s;
            position: relative;
        }

        .explore-card:hover {
            background: rgba(255,255,255,0.08);
            border-color: var(--primary);
            transform: scale(1.02);
        }

        .explore-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(24, 119, 242, 0.1) 100%);
            pointer-events: none;
        }

        /* ============ LOADING SPINNER ============ */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 768px) {
            .sidebar {
                width: 280px;
                left: -280px;
                transition: left 0.3s ease;
            }

            .sidebar.open {
                left: 0;
            }

            .main-content {
                margin-left: 0;
            }

            .modal-backdrop {
                justify-content: flex-end;
            }

            .modal {
                border-radius: 16px 16px 0 0;
            }

            .explore-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1px;
            }
        }

        @media (max-width: 480px) {
            .sidebar {
                width: 100%;
            }

            .post {
                border-radius: 0;
                margin: 0 0 0.5px 0;
                border: none;
                border-bottom: 1px solid rgba(255,255,255,0.1);
            }

            .create-post-card {
                border-radius: 0;
                margin: 0 0 0.5px 0;
                border: none;
                border-bottom: 1px solid rgba(255,255,255,0.1);
            }

            .feed {
                padding: 0;
            }

            .post-stats {
                font-size: 0.8rem;
            }

            .profile-stats {
                gap: 10px;
            }

            .profile-stat-number {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

        <!-- SIDEBAR -->

            <!-- CONTENT -->
            <div class="content" id="content">

                <div class="page active" id="homePage">
                    <div class="feed" id="feed">
                        <!-- Stories -->
                        <div class="stories-container" id="storiesContainer">
                            <div class="story" title="अपनी स्टोरी जोड़ें">
                                <i class="fas fa-plus"></i>
                            </div>

                        <!-- Create Post -->
                        <div class="create-post-card">
                            <div class="create-post-avatar" id="createPostAvatar">अ</div>
                            <div class="create-post-input-wrapper">
                                <input type="text" class="create-post-input" placeholder="कुछ शेयर करें..." onclick="openCreatePostModal()">
                                <div class="create-post-actions">

                                    <button class="create-action-btn" onclick="openCreatePostModal()">

                                        भावना
                                    </button>
                                    <button class="create-action-btn" onclick="openCreatePostModal()">
                                        <i class="fas fa-location-dot"></i>
                                        स्थान
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Posts Feed -->
                        <div id="postsContainer"></div>
                    </div>
                </div>

                <!-- EXPLORE PAGE -->
                <div class="page" id="explorePage">
                    <div style="padding: 20px; text-align: center;">
                        <h2 style="color: var(--light); margin-bottom: 20px;">खोज करें</h2>
                        <div class="explore-grid" id="exploreGrid">
                            <!-- Dynamic content -->

                <!-- PROFILE PAGE -->
                <div class="page" id="profilePage">
                    <div style="flex: 1; overflow-y: auto;">
                        <div class="profile-header">
                            <div class="profile-avatar-large" id="profileAvatar">अ</div>

                            <div class="profile-username" id="profileUsername">@username</div>
                            <div class="profile-stats">
                                <div class="profile-stat">
                                    <div class="profile-stat-number" id="profilePostCount">0</div>
                                    <div class="profile-stat-label">पोस्ट</div>
                                </div>
                                <div class="profile-stat">
                                    <div class="profile-stat-number" id="profileFollowers">0</div>
                                    <div class="profile-stat-label">फॉलोअर्स</div>
                                </div>
                                <div class="profile-stat">
                                    <div class="profile-stat-number" id="profileFollowing">0</div>
                                    <div class="profile-stat-label">फॉलो</div>

                        </div>
                        <div class="profile-actions">

    <!-- MODALS -->
    <!-- Create Post Modal -->
    <div class="modal-backdrop" id="createPostModal">
        <div class="modal">
            <div style="position: relative; margin-bottom: 20px;">
                <div class="modal-header">नई पोस्ट</div>
                <button class="modal-close-btn" onclick="closeModal('createPostModal')">&times;</button>

            <form onsubmit="submitPost(event)">

    <!-- Edit Profile Modal -->

    <!-- Login Modal -->
    <div class="modal-backdrop" id="loginModal" style="display: none; background: rgba(0,0,0,0.95);">
        <div class="modal" style="border-radius: 16px;">
            <div class="modal-header" style="margin-bottom: 30px;">
                <span style="font-size: 2rem;">समाज</span>
            </div>
            <p style="text-align: center; color: var(--gray); margin-bottom: 24px;">अपने समाज में जुड़ें</p>
            <form onsubmit="submitLogin(event)">
                <div class="form-group">
                    <label class="form-label">नाम</label>
                    <input type="text" class="form-input" id="loginName" placeholder="आपका नाम" required>
                </div>
                <div class="form-group">
                    <label class="form-label">यूजरनेम</label>
                    <input type="text" class="form-input" id="loginUsername" placeholder="यूनिक यूजरनेम" required>

                </div>
                <div id="loginError" style="margin-bottom: 16px;"></div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <i class="fas fa-sign-in-alt"></i>
                    समाज में जुड़ें
                </button>
            </form>
        </div>
    </div>

    <!-- TOAST CONTAINER -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ============ DATABASE SETUP (IndexedDB) ============
        let db = null;
        const DB_NAME = 'samaj_db';
        const DB_VERSION = 1;

        const initDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);

                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };

                request.onupgradeneeded = (event) => {
                    const database = event.target.result;

                    if (!database.objectStoreNames.contains('users')) {
                        database.createObjectStore('users', { keyPath: 'id' });
                    }
                    if (!database.objectStoreNames.contains('posts')) {
                        database.createObjectStore('posts', { keyPath: 'id' });
                    }
                    if (!database.objectStoreNames.contains('likes')) {
                        database.createObjectStore('likes', { keyPath: 'id' });
                    }
                    if (!database.objectStoreNames.contains('comments')) {
                        database.createObjectStore('comments', { keyPath: 'id' });
                    }
                };
            });
        };

        // ============ STORAGE OPERATIONS ============
        const dbOps = {
            async addUser(user) {
                const tx = db.transaction(['users'], 'readwrite');
                const store = tx.objectStore('users');
                return new Promise((resolve, reject) => {
                    store.put(user);
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
            },

            async getUser(id) {
                const tx = db.transaction(['users'], 'readonly');
                const store = tx.objectStore('users');
                return new Promise((resolve, reject) => {
                    const request = store.get(id);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            },

            async getAllUsers() {
                const tx = db.transaction(['users'], 'readonly');
                const store = tx.objectStore('users');
                return new Promise((resolve, reject) => {
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            },

            async addPost(post) {
                const tx = db.transaction(['posts'], 'readwrite');
                const store = tx.objectStore('posts');
                return new Promise((resolve, reject) => {
                    store.put(post);
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
            },

            async getPost(id) {
                const tx = db.transaction(['posts'], 'readonly');
                const store = tx.objectStore('posts');
                return new Promise((resolve, reject) => {
                    const request = store.get(id);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            },

            async getAllPosts() {
                const tx = db.transaction(['posts'], 'readonly');
                const store = tx.objectStore('posts');
                return new Promise((resolve, reject) => {
                    const request = store.getAll();
                    request.onsuccess = () => {
                        const posts = request.result.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                        resolve(posts);
                    };
                    request.onerror = () => reject(request.error);
                });
            },

            async getUserPosts(userId) {
                const allPosts = await this.getAllPosts();
                return allPosts.filter(post => post.userId === userId);
            },

            async deletePost(id) {
                const tx = db.transaction(['posts'], 'readwrite');
                const store = tx.objectStore('posts');
                return new Promise((resolve, reject) => {
                    store.delete(id);
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
            },

            async addComment(comment) {
                const tx = db.transaction(['comments'], 'readwrite');
                const store = tx.objectStore('comments');
                return new Promise((resolve, reject) => {
                    store.put(comment);
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
            },

            async getPostComments(postId) {
                const tx = db.transaction(['comments'], 'readonly');
                const store = tx.objectStore('comments');
                return new Promise((resolve, reject) => {
                    const request = store.getAll();
                    request.onsuccess = () => {
                        const comments = request.result
                            .filter(c => c.postId === postId)
                            .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
                        resolve(comments);
                    };
                    request.onerror = () => reject(request.error);
                });
            },

            async addLike(like) {
                const tx = db.transaction(['likes'], 'readwrite');
                const store = tx.objectStore('likes');
                return new Promise((resolve, reject) => {
                    store.put(like);
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
            },

            async getLike(id) {
                const tx = db.transaction(['likes'], 'readonly');
                const store = tx.objectStore('likes');
                return new Promise((resolve, reject) => {
                    const request = store.get(id);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            },

            async getPostLikes(postId) {
                const tx = db.transaction(['likes'], 'readonly');
                const store = tx.objectStore('likes');
                return new Promise((resolve, reject) => {
                    const request = store.getAll();
                    request.onsuccess = () => {
                        const likes = request.result.filter(l => l.postId === postId);
                        resolve(likes);
                    };
                    request.onerror = () => reject(request.error);
                });
            },

            async deleteLike(id) {
                const tx = db.transaction(['likes'], 'readwrite');
                const store = tx.objectStore('likes');
                return new Promise((resolve, reject) => {
                    store.delete(id);
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
            }
        };

        // ============ STATE ============
        let currentUser = null;
        let currentPage = 'home';

        // ============ UTILITIES ============
        const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2);

        const getInitials = (name) => {
            return name
                .split(' ')
                .map(n => n[0])
                .join('')
                .toUpperCase()
                .slice(0, 2);
        };

        const formatTime = (timestamp) => {
            const now = new Date();
            const date = new Date(timestamp);
            const diff = now - date;

            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);

            if (minutes < 1) return 'अभी';
            if (minutes < 60) return `${minutes}m`;
            if (hours < 24) return `${hours}h`;
            if (days < 7) return `${days}d`;

            return date.toLocaleDateString('hi-IN');
        };

        const showToast = (message, type = 'success') => {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                <span>${message}</span>
            `;

            const container = document.getElementById('toastContainer');
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'slideOut 0.3s ease-out';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        const openModal = (modalId) => {
            document.getElementById(modalId).classList.add('show');
        };

        const closeModal = (modalId) => {
            document.getElementById(modalId).classList.remove('show');
        };

        // ============ AUTHENTICATION ============
        const submitLogin = async (e) => {
            e.preventDefault();

            const name = document.getElementById('loginName').value.trim();
            const username = document.getElementById('loginUsername').value.trim();
            const phone = document.getElementById('loginPhone').value.trim();
            const email = document.getElementById('loginEmail').value.trim();

            if (!name || !username || !phone) {
                showToast('सभी आवश्यक फील्ड भरें', 'error');
                return;
            }

            if (phone.length < 10) {
                showToast('वैध फोन नंबर दर्ज करें', 'error');
                return;
            }

            currentUser = {
                id: generateId(),
                name,
                username,
                phone,
                email,
                avatar: getInitials(name),
                bio: '',
                createdAt: new Date().toISOString()
            };

            try {
                await dbOps.addUser(currentUser);
                localStorage.setItem('currentUserId', currentUser.id);
                document.getElementById('loginModal').style.display = 'none';
                updateUI();
                showToast(`स्वागत है ${name}! 🎉`, 'success');
            } catch (error) {
                showToast('त्रुटि: उपयोगकर्ता सहेजना विफल', 'error');
            }
        };

        const logout = async () => {
            if (confirm('क्या आप लॉगआउट करना चाहते हैं?')) {
                currentUser = null;
                localStorage.removeItem('currentUserId');
                document.getElementById('loginModal').style.display = 'flex';
                document.getElementById('loginModal').style.justifyContent = 'center';
                document.getElementById('loginModal').style.alignItems = 'center';
                showToast('लॉगआउट सफल', 'success');
            }
        };

        // ============ POST MANAGEMENT ============
        const submitPost = async (e) => {
            e.preventDefault();

            if (!currentUser) {
                showToast('पहले लॉगिन करें', 'error');
                return;
            }

            const content = document.getElementById('postContent').value.trim();
            if (!content) {
                showToast('कुछ लिखें', 'error');
                return;
            }

            const imageInput = document.getElementById('postImage');
            let imageData = null;

            if (imageInput.files.length > 0) {
                imageData = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsDataURL(imageInput.files[0]);
                });
            }

            const post = {
                id: generateId(),
                userId: currentUser.id,
                username: currentUser.username,
                name: currentUser.name,
                avatar: currentUser.avatar,
                content,
                image: imageData,
                timestamp: new Date().toISOString(),
                likes: 0,
                comments: 0
            };

            try {
                await dbOps.addPost(post);
                showToast('पोस्ट सफलतापूर्वक शेयर किया गया! 📸', 'success');
                closeModal('createPostModal');
                document.getElementById('postContent').value = '';
                document.getElementById('postImage').value = '';
                document.getElementById('imagePreview').innerHTML = '';
                renderFeed();
            } catch (error) {
                showToast('पोस्ट साझा करने में विफल', 'error');
            }
        };

        const deletePost = async (postId) => {
            if (confirm('पोस्ट हटा दें?')) {
                try {
                    await dbOps.deletePost(postId);
                    showToast('पोस्ट हटा दी गई', 'success');
                    renderFeed();
                    renderProfilePage();
                } catch (error) {
                    showToast('पोस्ट हटाने में विफल', 'error');
                }
            }
        };

        // ============ LIKES ============
        const toggleLike = async (postId) => {
            if (!currentUser) {
                showToast('पहले लॉगिन करें', 'error');
                return;
            }

            const likeId = `${postId}-${currentUser.id}`;
            const existingLike = await dbOps.getLike(likeId);

            try {
                if (existingLike) {
                    await dbOps.deleteLike(likeId);
                } else {
                    await dbOps.addLike({
                        id: likeId,
                        postId,
                        userId: currentUser.id,
                        timestamp: new Date().toISOString()
                    });
                }
                renderFeed();
            } catch (error) {
                showToast('लाइक अपडेट करने में विफल', 'error');
            }
        };

        // ============ COMMENTS ============
        const submitComment = async (postId) => {
            if (!currentUser) {
                showToast('पहले लॉगिन करें', 'error');
                return;
            }

            const input = document.getElementById(`commentInput-${postId}`);
            const text = input.value.trim();

            if (!text) return;

            const comment = {
                id: generateId(),
                postId,
                userId: currentUser.id,
                username: currentUser.username,
                name: currentUser.name,
                avatar: currentUser.avatar,
                text,
                timestamp: new Date().toISOString()
            };

            try {
                await dbOps.addComment(comment);
                input.value = '';
                renderFeed();
            } catch (error) {
                showToast('कमेंट जोड़ने में विफल', 'error');
            }
        };

        // ============ RENDERING ============
        const renderFeed = async () => {
            const posts = await dbOps.getAllPosts();
            const container = document.getElementById('postsContainer');

            if (posts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📝</div>
                        <div class="empty-title">अभी कोई पोस्ट नहीं</div>
                        <div class="empty-text">पहली पोस्ट बनाएं और अपनी कहानी साझा करें!</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = posts.map(post => `
                <div class="post">
                    <div class="post-header">
                        <div class="post-user-info">
                            <div class="post-avatar">${post.avatar}</div>
                            <div class="post-user-details">
                                <div class="post-username">${post.name}</div>
                                <div class="post-time">${formatTime(post.timestamp)}</div>
                            </div>
                        </div>
                        ${post.userId === currentUser?.id ? `
                            <button class="post-menu-btn" onclick="deletePost('${post.id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        ` : ''}
                    </div>
                    <div class="post-content">${post.content}</div>
                    ${post.image ? `<img src="${post.image}" class="post-image" alt="Post image">` : ''}
                    <div class="post-stats">
                        <span class="stat">
                            <i class="fas fa-heart"></i>
                            <span id="likes-${post.id}">0</span> पसंद
                        </span>
                        <span class="stat">
                            <i class="fas fa-comment"></i>
                            <span id="comments-${post.id}">0</span> कमेंट
                        </span>
                        <span class="stat">
                            <i class="fas fa-share"></i>
                            शेयर करें
                        </span>
                    </div>
                    <div class="post-actions">
                        <button class="action-btn" id="likeBtn-${post.id}" onclick="toggleLike('${post.id}')">
                            <i class="fas fa-heart"></i>
                            पसंद
                        </button>
                        <button class="action-btn" onclick="document.getElementById('commentSection-${post.id}').classList.toggle('show'); document.getElementById('commentInput-${post.id}').focus();">
                            <i class="fas fa-comment"></i>
                            कमेंट
                        </button>
                        <button class="action-btn">
                            <i class="fas fa-share"></i>
                            शेयर
                        </button>
                    </div>
                    <div class="comments-section" id="commentSection-${post.id}">
                        <div id="commentsContainer-${post.id}"></div>
                        <div class="comment-input-wrapper show">
                            <input type="text" class="comment-input" id="commentInput-${post.id}" placeholder="कमेंट करें...">
                            <button type="button" class="comment-submit-btn" onclick="submitComment('${post.id}')">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');

            // Load likes and comments
            for (const post of posts) {
                const likes = await dbOps.getPostLikes(post.id);
                const comments = await dbOps.getPostComments(post.id);

                document.getElementById(`likes-${post.id}`).textContent = likes.length;
                document.getElementById(`comments-${post.id}`).textContent = comments.length;

                const isLiked = likes.some(l => l.userId === currentUser?.id);
                const likeBtn = document.getElementById(`likeBtn-${post.id}`);
                if (isLiked) {
                    likeBtn.classList.add('liked');
                    likeBtn.innerHTML = '<i class="fas fa-heart"></i> पसंद है';
                }

                const commentsContainer = document.getElementById(`commentsContainer-${post.id}`);
                if (comments.length > 0) {
                    commentsContainer.innerHTML = comments.map(c => `
                        <div class="comment">
                            <div class="comment-avatar">${c.avatar}</div>
                            <div class="comment-content">
                                <div class="comment-header">
                                    <span class="comment-username">${c.name}</span>
                                    <span class="comment-time">${formatTime(c.timestamp)}</span>
                                </div>
                                <div class="comment-text">${c.text}</div>
                            </div>
                        </div>
                    `).join('');
                }
            }
        };

        const renderProfilePage = async () => {
            if (!currentUser) return;

            const posts = await dbOps.getUserPosts(currentUser.id);

            document.getElementById('profileAvatar').textContent = currentUser.avatar;
            document.getElementById('profileName').textContent = currentUser.name;
            document.getElementById('profileUsername').textContent = `@${currentUser.username}`;
            document.getElementById('profilePostCount').textContent = posts.length;
            document.getElementById('profileFollowers').textContent = '0';
            document.getElementById('profileFollowing').textContent = '0';

            if (currentUser.bio) {
                document.getElementById('profileBio').textContent = currentUser.bio;
                document.getElementById('profileBio').style.display = 'block';
            }

            const profilePostsContainer = document.getElementById('profilePostsContainer');
            if (posts.length === 0) {
                profilePostsContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📸</div>
                        <div class="empty-title">अभी कोई पोस्ट नहीं</div>
                        <div class="empty-text">अपनी पहली पोस्ट बनाएं</div>
                    </div>
                `;
                return;
            }

            profilePostsContainer.innerHTML = posts.map(post => `
                <div class="post">
                    <div class="post-header">
                        <div class="post-user-info">
                            <div class="post-avatar">${post.avatar}</div>
                            <div class="post-user-details">
                                <div class="post-username">${post.name}</div>
                                <div class="post-time">${formatTime(post.timestamp)}</div>
                            </div>
                        </div>
                        <button class="post-menu-btn" onclick="deletePost('${post.id}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                    <div class="post-content">${post.content}</div>
                    ${post.image ? `<img src="${post.image}" class="post-image" alt="Post image">` : ''}
                    <div class="post-stats">
                        <span class="stat"><i class="fas fa-heart"></i> 0 पसंद</span>
                        <span class="stat"><i class="fas fa-comment"></i> 0 कमेंट</span>
                    </div>
                </div>
            `).join('');
        };

        const renderExplore = async () => {
            const allUsers = await dbOps.getAllUsers();
            const otherUsers = allUsers.filter(u => u.id !== currentUser?.id);
            const grid = document.getElementById('exploreGrid');

            if (otherUsers.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; padding: 40px 20px; text-align: center; color: var(--gray);">
                        अभी कोई अन्य उपयोगकर्ता नहीं हैं
                    </div>
                `;
                return;
            }

            grid.innerHTML = otherUsers.map(user => `
                <div class="explore-card" title="${user.name}">
                    <div style="text-align: center;">
                        <div style="font-size: 2.5rem; margin-bottom: 8px;">${user.avatar}</div>
                        <div style="font-size: 0.85rem; font-weight: 600;">${user.name}</div>
                    </div>
                </div>
            `).join('');
        };

        const navigateTo = async (page) => {
            currentPage = page;
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));

            const pageEl = document.getElementById(page + 'Page');
            if (pageEl) pageEl.classList.add('active');

            document.querySelector(`[data-page="${page}"]`).classList.add('active');

            const titles = {
                home: 'होम',
                explore: 'खोजें',
                profile: 'प्रोफाइल'
            };
            document.getElementById('headerTitle').textContent = titles[page];

            if (page === 'home') {
                await renderFeed();
            } else if (page === 'explore') {
                await renderExplore();
            } else if (page === 'profile') {
                await renderProfilePage();
            }
        };

        const updateUI = () => {
            if (currentUser) {
                document.getElementById('sidebarUserAvatar').textContent = currentUser.avatar;
                document.getElementById('sidebarUsername').textContent = currentUser.username;
                document.getElementById('createPostAvatar').textContent = currentUser.avatar;
                navigateTo('home');
            }
        };

        // ============ MODALS ============
        const openCreatePostModal = () => {
            if (!currentUser) {
                showToast('पहले लॉगिन करें', 'error');
                return;
            }
            openModal('createPostModal');
        };

        const openEditProfileModal = () => {
            if (!currentUser) return;

            document.getElementById('editName').value = currentUser.name;
            document.getElementById('editUsername').value = currentUser.username;
            document.getElementById('editPhone').value = currentUser.phone;
            document.getElementById('editEmail').value = currentUser.email || '';
            document.getElementById('editBio').value = currentUser.bio || '';

            openModal('editProfileModal');
        };

        const submitEditProfile = async (e) => {
            e.preventDefault();

            currentUser.name = document.getElementById('editName').value;
            currentUser.username = document.getElementById('editUsername').value;
            currentUser.phone = document.getElementById('editPhone').value;
            currentUser.email = document.getElementById('editEmail').value;
            currentUser.bio = document.getElementById('editBio').value;
            currentUser.avatar = getInitials(currentUser.name);

            try {
                await dbOps.addUser(currentUser);
                showToast('प्रोफाइल अपडेट किया गया! ✨', 'success');
                closeModal('editProfileModal');
                updateUI();
                renderProfilePage();
            } catch (error) {
                showToast('प्रोफाइल अपडेट विफल', 'error');
            }
        };

        const toggleNotifications = () => {
            showToast('कोई नई सूचना नहीं', 'success');
        };

        const toggleSettings = () => {
            showToast('सेटिंग्स जल्द आएंगी', 'success');
        };

        // ============ IMAGE PREVIEW ============
        document.addEventListener('DOMContentLoaded', async () => {
            await initDB();

            const userId = localStorage.getItem('currentUserId');
            if (userId) {
                currentUser = await dbOps.getUser(userId);
                if (currentUser) {
                    updateUI();
                } else {
                    document.getElementById('loginModal').style.display = 'flex';
                }
            } else {
                document.getElementById('loginModal').style.display = 'flex';
            }

            const imageInput = document.getElementById('postImage');
            if (imageInput) {
                imageInput.addEventListener('change', (e) => {
                    const preview = document.getElementById('imagePreview');
                    if (e.target.files.length > 0) {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            preview.innerHTML = `
                                <div style="position: relative; border-radius: 8px; overflow: hidden;">
                                    <img src="${event.target.result}" style="width: 100%; max-height: 300px; object-fit: cover; border-radius: 8px;">
                                    <button type="button" style="position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); color: white; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 1.2rem;" onclick="document.getElementById('postImage').value = ''; this.parentElement.parentElement.innerHTML = '';">✕</button>
                                </div>
                            `;
                        };
                        reader.readAsDataURL(e.target.files[0]);
                    }
                });
            }

            // Mobile menu toggle
            window.addEventListener('click', (e) => {
                const sidebar = document.getElementById('sidebar');
                if (!sidebar.contains(e.target) && !e.target.closest('.logo-toggle')) {
                    if (window.innerWidth <= 768) {
                        sidebar.classList.remove('open');
                    }
                }
            });
        });

        // Online/Offline Detection
        window.addEventListener('online', () => {
            showToast('आप ऑनलाइन हैं! 🟢', 'success');
        });

        window.addEventListener('offline', () => {
            showToast('आप ऑफलाइन हैं। डेटा स्थानीय रूप से सहेजा जाएगा।', 'error');
        });
    </script>
</body>
</html>
