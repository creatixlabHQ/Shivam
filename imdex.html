    <script>
        const foodData = [
            { id: 1, name: "Double Cheese Margherita", price: 349, rating: 4.5, img: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=600", desc: "Extra cheese, extra happiness." },
            { id: 2, name: "Chicken Dum Biryani", price: 450, rating: 4.9, img: "https://images.unsplash.com/photo-1589302168068-964664d93dc0?w=600", desc: "Classic Hyderabadi style." },
            { id: 3, name: "Classic Cold Coffee", price: 120, rating: 4.2, img: "https://images.unsplash.com/photo-1559496417-e7f25cb247f3?w=600", desc: "Thandi thandi coffee." },
            { id: 4, name: "Paneer Tikka Masala", price: 280, rating: 4.4, img: "https://images.unsplash.com/photo-1631452180519-c014fe946bc7?w=600", desc: "Spicy and creamy paneer." },
            { id: 5, name: "Veg Hakka Noodles", price: 199, rating: 4.0, img: "https://images.unsplash.com/photo-1585032226651-759b368d7246?w=600", desc: "Street style noodles." },
            { id: 6, name: "Chocolate Brownie", price: 150, rating: 4.7, img: "https://images.unsplash.com/photo-1564355808539-22fda35bed7e?w=600", desc: "Fudgy brownie with nuts." }
        ];

        let cart = [];
        let currentPage = 'menu-page';

        function renderMenu(items = foodData) {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = items.map(f => {
                const cartItem = cart.find(c => c.id === f.id);
                
                // COMPACT COUNTER
                const btnContent = cartItem 
                    ? `<div class="flex items-center justify-between w-24 bg-[#ef4f5f] text-white px-3 py-1.5 rounded-xl font-bold shadow-md">
                        <button onclick="changeQty(${f.id}, -1)" class="hover:scale-110">-</button>
                        <span class="text-sm">${cartItem.qty}</span>
                        <button onclick="changeQty(${f.id}, 1)" class="hover:scale-110">+</button>
                       </div>`
                    : `<button onclick="addToCart(${f.id})" class="w-20 border-2 border-[#ef4f5f] text-[#ef4f5f] px-4 py-1.5 rounded-xl font-black text-xs hover:bg-[#ef4f5f] hover:text-white transition-all uppercase tracking-tighter">ADD</button>`;

                return `
                <div class="food-card bg-white rounded-[2rem] overflow-hidden shadow-sm hover:shadow-xl border border-gray-100 transition-all p-4 flex gap-5 items-center">
                    <div class="relative flex-shrink-0">
                        <img src="${f.img}" class="w-32 h-32 md:w-36 md:h-36 object-cover rounded-[1.5rem] shadow-md">
                        <div class="absolute -top-2 -left-2 bg-green-600 text-white text-[10px] font-black px-2 py-1 rounded-lg shadow-sm">
                            ${f.rating} <i class="fa fa-star text-[8px]"></i>
                        </div>
                    <div class="absolute -top-2 -right-2 bg-[#ef4f5f] text-white text-[10px] font-black px-2 py-1 rounded-lg shadow-sm z-10">

        10% OFF

    </div>

</div>

                    <div class="flex-1">
                        <h3 class="font-black text-gray-800 text-lg leading-tight mb-1">${f.name}</h3>
                        <p class="text-gray-400 text-xs mb-3 line-clamp-1">${f.desc}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-xl font-black text-[#ef4f5f]">₹${f.price}</span>
                            <div id="btn-container-${f.id}">${btnContent}</div>
                        </div>
                    </div>
                </div>`;
            }).join('');
            
            if(items.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-gray-400 italic">No matches found... Try searching something else!</div>`;
            }
            updateBottomBar();
        }

        function addToCart(id) {
            const product = foodData.find(p => p.id === id);
            cart.push({...product, qty: 1});
            renderMenu();
        }

        function changeQty(id, change) {
            const index = cart.findIndex(item => item.id === id);
            if(index !== -1) {
                cart[index].qty += change;
                if(cart[index].qty <= 0) cart.splice(index, 1);
                renderMenu();
                if(currentPage === 'cart-page') updateCartUI();
            }
        }

        function goToPage(pageId) {
            currentPage = pageId;
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(pageId).classList.add('active-page');
            
            // Search bar handle
            document.getElementById('search-container').style.display = (pageId === 'cart-page') ? 'none' : 'block';

            if(pageId === 'cart-page') {
                updateCartUI();
                detectLocation();
            }
            updateBottomBar();
            window.scrollTo(0,0);
        }

        function updateBottomBar() {
            const bar = document.getElementById('bottom-bar');
            const info = document.getElementById('item-info');
            if(cart.length > 0 && currentPage === 'menu-page') {
                bar.classList.add('show');
                const totalItems = cart.reduce((s, i) => s + i.qty, 0);
                info.innerText = `${totalItems} Item${totalItems > 1 ? 's' : ''} Added`;
            } else {
                bar.classList.remove('show');
            }
        }

        function updateCartUI() {
            const list = document.getElementById('cart-list');
            const totalEl = document.getElementById('total-price');
            const subTotalEl = document.getElementById('sub-total');
            let grandTotal = 0;

            if(cart.length === 0) {
                list.innerHTML = `<div class="text-center py-10 text-gray-400">Your basket is empty!</div>`;
                totalEl.innerText = "₹0";
                subTotalEl.innerText = "₹0";
                return;
            }

            list.innerHTML = cart.map(item => {
                grandTotal += (item.price * item.qty);
                return `
                <div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl border border-gray-100">
                    <div>
                        <p class="font-black text-gray-800 text-sm">${item.name}</p>
                        <p class="text-[#ef4f5f] text-xs font-bold">₹${item.price}</p>
                    </div>
                    <div class="flex items-center gap-4 bg-white border border-gray-200 rounded-xl px-3 py-1 shadow-sm">
                        <button onclick="changeQty(${item.id}, -1)" class="text-[#ef4f5f] font-black text-lg">-</button>
                        <span class="text-sm font-black w-4 text-center">${item.qty}</span>
                        <button onclick="changeQty(${item.id}, 1)" class="text-[#ef4f5f] font-black text-lg">+</button>
                    </div>
                </div>`;
            }).join('');

            subTotalEl.innerText = `₹${grandTotal}`;
            totalEl.innerText = `₹${grandTotal + 45}`;
        }

        function detectLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const { latitude, longitude } = pos.coords;
                    document.getElementById('autoAddress').value = `GPS Locked: ${latitude.toFixed(4)}N, ${longitude.toFixed(4)}E (Basti Area)`;
                }, () => {
                    document.getElementById('autoAddress').value = "GPS Access Denied. (Manual Required)";
                });
            }
        }

        function placeOrder() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            if(!name || !phone || cart.length === 0) {
                alert("Bhai, Details aur Food dono zaroori hain!");
